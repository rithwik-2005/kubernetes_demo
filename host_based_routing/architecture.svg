<svg xmlns="http://www.w3.org/2000/svg" width="900" height="640" viewBox="0 0 900 640" font-family="Arial, sans-serif">

  <rect width="900" height="640" fill="#f8f9fa" rx="12"/>

  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">Kubernetes Host-Based Routing — Architecture</text>
  <text x="450" y="56" text-anchor="middle" font-size="12" fill="#666">3 nodes · 2 pods per node · Nginx Ingress · Virtual Hosting</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="inherit" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <!-- Browser -->
  <rect x="290" y="72" width="320" height="52" rx="8" fill="#e8eaf6" stroke="#5c6bc0" stroke-width="1.5"/>
  <text x="450" y="93" text-anchor="middle" font-size="13" font-weight="bold" fill="#283593">Browser / curl</text>
  <text x="450" y="111" text-anchor="middle" font-size="11" fill="#3949ab">wear.example.com  ·  watch.example.com  ·  books.example.com</text>

  <line x1="450" y1="124" x2="450" y2="150" stroke="#5c6bc0" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="476" y="141" font-size="10" fill="#888">minikube tunnel</text>

  <!-- /etc/hosts note -->
  <rect x="640" y="72" width="240" height="52" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
  <text x="760" y="91" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">/etc/hosts</text>
  <text x="760" y="107" text-anchor="middle" font-size="10" fill="#bf360c">127.0.0.1  wear.example.com</text>
  <text x="760" y="120" text-anchor="middle" font-size="10" fill="#bf360c">127.0.0.1  watch.example.com</text>

  <!-- Nginx Ingress -->
  <rect x="90" y="150" width="720" height="60" rx="10" fill="#fce4ec" stroke="#e91e63" stroke-width="1.5"/>
  <text x="450" y="172" text-anchor="middle" font-size="13" font-weight="bold" fill="#880e4f">Nginx Ingress Controller — Host-Based Routing</text>
  <text x="230" y="192" text-anchor="middle" font-size="11" fill="#c2185b">host: wear.example.com</text>
  <text x="450" y="192" text-anchor="middle" font-size="11" fill="#c2185b">host: watch.example.com</text>
  <text x="670" y="192" text-anchor="middle" font-size="11" fill="#c2185b">host: books.example.com</text>

  <!-- Arrows from ingress to 3 services -->
  <line x1="230" y1="210" x2="175" y2="258" stroke="#e91e63" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="450" y1="210" x2="450" y2="258" stroke="#e91e63" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="670" y1="210" x2="725" y2="258" stroke="#e91e63" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Service 1: wear -->
  <rect x="64" y="258" width="222" height="46" rx="8" fill="#ede7f6" stroke="#7e57c2" stroke-width="1.5"/>
  <text x="175" y="278" text-anchor="middle" font-size="13" font-weight="bold" fill="#4527a0">wear-service</text>
  <text x="175" y="295" text-anchor="middle" font-size="11" fill="#6a1b9a">ClusterIP  ·  selector: app=wear</text>

  <!-- Service 2: watch -->
  <rect x="339" y="258" width="222" height="46" rx="8" fill="#e0f2f1" stroke="#009688" stroke-width="1.5"/>
  <text x="450" y="278" text-anchor="middle" font-size="13" font-weight="bold" fill="#004d40">watch-service</text>
  <text x="450" y="295" text-anchor="middle" font-size="11" fill="#00695c">ClusterIP  ·  selector: app=watch</text>

  <!-- Service 3: books -->
  <rect x="614" y="258" width="222" height="46" rx="8" fill="#fff8e1" stroke="#f9a825" stroke-width="1.5"/>
  <text x="725" y="278" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">books-service</text>
  <text x="725" y="295" text-anchor="middle" font-size="11" fill="#bf360c">ClusterIP  ·  selector: app=books</text>

  <!-- Arrows services to nodes -->
  <line x1="175" y1="304" x2="175" y2="354" stroke="#7e57c2" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="450" y1="304" x2="450" y2="354" stroke="#009688" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="725" y1="304" x2="725" y2="354" stroke="#f9a825" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- NODE 1: wear -->
  <rect x="30" y="354" width="290" height="226" rx="14" fill="#f3e5f5" stroke="#7e57c2" stroke-width="2"/>
  <text x="175" y="378" text-anchor="middle" font-size="13" font-weight="bold" fill="#4527a0">Node 1 — minikube</text>
  <text x="175" y="396" text-anchor="middle" font-size="10" fill="#6a1b9a">kubernetes.io/hostname: minikube</text>
  <rect x="50" y="410" width="110" height="72" rx="8" fill="#ce93d8" stroke="#7e57c2" stroke-width="1"/>
  <text x="105" y="432" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a0030">wear — pod 1</text>
  <text x="105" y="450" text-anchor="middle" font-size="10" fill="#2d003f">http-echo</text>
  <text x="105" y="466" text-anchor="middle" font-size="10" fill="#2d003f">port: 5678</text>
  <rect x="190" y="410" width="110" height="72" rx="8" fill="#ce93d8" stroke="#7e57c2" stroke-width="1"/>
  <text x="245" y="432" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a0030">wear — pod 2</text>
  <text x="245" y="450" text-anchor="middle" font-size="10" fill="#2d003f">http-echo</text>
  <text x="245" y="466" text-anchor="middle" font-size="10" fill="#2d003f">port: 5678</text>
  <rect x="66" y="498" width="218" height="22" rx="4" fill="#e1bee7"/>
  <text x="175" y="513" text-anchor="middle" font-size="10" fill="#4a148c">replicas: 2   label: app=wear</text>
  <rect x="66" y="526" width="218" height="22" rx="4" fill="#d1c4e9"/>
  <text x="175" y="541" text-anchor="middle" font-size="10" fill="#311b92">nodeSelector: minikube</text>
  <rect x="66" y="554" width="218" height="16" rx="4" fill="#b39ddb"/>
  <text x="175" y="566" text-anchor="middle" font-size="10" fill="#1a0050">wear.example.com → this node</text>

  <!-- NODE 2: watch -->
  <rect x="305" y="354" width="290" height="226" rx="14" fill="#e0f2f1" stroke="#009688" stroke-width="2"/>
  <text x="450" y="378" text-anchor="middle" font-size="13" font-weight="bold" fill="#004d40">Node 2 — minikube-m02</text>
  <text x="450" y="396" text-anchor="middle" font-size="10" fill="#00695c">kubernetes.io/hostname: minikube-m02</text>
  <rect x="325" y="410" width="110" height="72" rx="8" fill="#80cbc4" stroke="#009688" stroke-width="1"/>
  <text x="380" y="432" text-anchor="middle" font-size="12" font-weight="bold" fill="#001a17">watch — pod 1</text>
  <text x="380" y="450" text-anchor="middle" font-size="10" fill="#002920">http-echo</text>
  <text x="380" y="466" text-anchor="middle" font-size="10" fill="#002920">port: 5678</text>
  <rect x="465" y="410" width="110" height="72" rx="8" fill="#80cbc4" stroke="#009688" stroke-width="1"/>
  <text x="520" y="432" text-anchor="middle" font-size="12" font-weight="bold" fill="#001a17">watch — pod 2</text>
  <text x="520" y="450" text-anchor="middle" font-size="10" fill="#002920">http-echo</text>
  <text x="520" y="466" text-anchor="middle" font-size="10" fill="#002920">port: 5678</text>
  <rect x="341" y="498" width="218" height="22" rx="4" fill="#b2dfdb"/>
  <text x="450" y="513" text-anchor="middle" font-size="10" fill="#004d40">replicas: 2   label: app=watch</text>
  <rect x="341" y="526" width="218" height="22" rx="4" fill="#80cbc4"/>
  <text x="450" y="541" text-anchor="middle" font-size="10" fill="#00251a">nodeSelector: minikube-m02</text>
  <rect x="341" y="554" width="218" height="16" rx="4" fill="#4db6ac"/>
  <text x="450" y="566" text-anchor="middle" font-size="10" fill="#001a17">watch.example.com → this node</text>

  <!-- NODE 3: books -->
  <rect x="580" y="354" width="290" height="226" rx="14" fill="#fff8e1" stroke="#f9a825" stroke-width="2"/>
  <text x="725" y="378" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">Node 3 — minikube-m03</text>
  <text x="725" y="396" text-anchor="middle" font-size="10" fill="#bf360c">kubernetes.io/hostname: minikube-m03</text>
  <rect x="600" y="410" width="110" height="72" rx="8" fill="#ffe082" stroke="#f9a825" stroke-width="1"/>
  <text x="655" y="432" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a0800">books — pod 1</text>
  <text x="655" y="450" text-anchor="middle" font-size="10" fill="#2d1200">http-echo</text>
  <text x="655" y="466" text-anchor="middle" font-size="10" fill="#2d1200">port: 5678</text>
  <rect x="740" y="410" width="110" height="72" rx="8" fill="#ffe082" stroke="#f9a825" stroke-width="1"/>
  <text x="795" y="432" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a0800">books — pod 2</text>
  <text x="795" y="450" text-anchor="middle" font-size="10" fill="#2d1200">http-echo</text>
  <text x="795" y="466" text-anchor="middle" font-size="10" fill="#2d1200">port: 5678</text>
  <rect x="616" y="498" width="218" height="22" rx="4" fill="#ffecb3"/>
  <text x="725" y="513" text-anchor="middle" font-size="10" fill="#e65100">replicas: 2   label: app=books</text>
  <rect x="616" y="526" width="218" height="22" rx="4" fill="#ffe082"/>
  <text x="725" y="541" text-anchor="middle" font-size="10" fill="#bf360c">nodeSelector: minikube-m03</text>
  <rect x="616" y="554" width="218" height="16" rx="4" fill="#ffca28"/>
  <text x="725" y="566" text-anchor="middle" font-size="10" fill="#3e2000">books.example.com → this node</text>

  <!-- Legend -->
  <rect x="30" y="596" width="840" height="32" rx="6" fill="#eceff1" stroke="#b0bec5" stroke-width="1"/>
  <text x="450" y="617" text-anchor="middle" font-size="11" fill="#455a64">Host-based routing: Nginx reads the Host header of each request and forwards to the matching Service · /etc/hosts maps hostnames to 127.0.0.1</text>

</svg>
